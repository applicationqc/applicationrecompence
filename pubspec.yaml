name: le_ptit_cash
description: Application de jeu avec système de points virtuels et mini-jeux
publish_to: 'none'
version: 10.0.21+21

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^0.8.7+4
  http: ^1.6.0
  url_launcher: ^6.1.10
  csv: ^5.0.0
  shared_preferences: ^2.2.2
  google_mobile_ads: ^5.0.0
  bitlabs: ^2.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
